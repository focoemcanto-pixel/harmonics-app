#:schema node_modules/wrangler/config-schema.json
name = "harmonics-app"
main = ".open-next/worker.mjs"
compatibility_date = "2024-05-01"
compatibility_flags = ["nodejs_compat"]

# Assets configuration
[site]
bucket = ".open-next/assets"

# Environment variables
[vars]
# Add non-sensitive vars here
# NEXT_PUBLIC_SUPABASE_URL = "https://your-project.supabase.co"

# Secrets (add via CLI: wrangler secret put SECRET_NAME)
# - SUPABASE_ANON_KEY
# - GOOGLE_CLIENT_SECRET

# KV Namespaces for caching (optional - OpenNext creates automatically)
# [[kv_namespaces]]
# binding = "NEXT_CACHE_KV"
# id = "your-kv-id"

# Preview environment
[env.preview]
name = "harmonics-app-preview"
vars = { ENVIRONMENT = "preview" }

# Production optimizations
[observability]
enabled = true

# Limits
[limits]
cpu_ms = 50000
